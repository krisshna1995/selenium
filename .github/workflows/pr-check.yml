name: PR Compile Check

on:
  pull_request:

jobs:
  compile:
    name: Compile gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile main + test sources
        run: mvn -B -DskipTests clean compile test-compile
